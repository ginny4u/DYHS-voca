<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 어휘 퀴즈 (오답노트 기능 포함)</title>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background-color: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #333; font-size: 1.1rem; line-height: 1.5; margin: 0; }
        .progress { font-size: 0.9rem; color: #007bff; font-weight: bold; }
        .meaning-box { background-color: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #007bff; margin-bottom: 20px; font-size: 1.05rem; line-height: 1.4; color: #444;}
        .option { display: block; width: 100%; padding: 14px 15px; margin-bottom: 10px; background-color: #fff; border: 1px solid #dee2e6; border-radius: 8px; cursor: pointer; text-align: left; font-size: 1.1rem; font-weight: bold; color: #333; transition: all 0.2s; }
        .option:hover { background-color: #f1f3f5; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; font-size: 0.95rem; line-height: 1.4; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .next-btn { margin-top: 20px; width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; display: none; }
        .next-btn:hover { background-color: #0056b3; }
        .result { text-align: center; font-size: 1.2rem; color: #333; line-height: 1.6; margin-bottom: 20px;}
        .restart-btn { width: 100%; padding: 14px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        
        /* 오답 노트 전용 디자인 추가 */
        .wrong-note-container { margin-top: 20px; text-align: left; background: #fff3f3; padding: 15px; border-radius: 8px; border: 1px solid #ffc8c8; margin-bottom: 20px;}
        .wrong-note-title { font-size: 1.1rem; font-weight: bold; color: #d9534f; margin-bottom: 10px; }
        .wrong-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ffc8c8; font-size: 0.95rem; line-height: 1.5; }
        .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .w-meaning { font-weight: bold; margin-bottom: 5px; color: #333; }
        .w-user { color: #999; text-decoration: line-through; font-size: 0.9rem; }
        .w-correct { color: #d9534f; font-weight: bold; }
        .perfect-score { background: #d4edda; border-color: #c3e6cb; text-align: center; padding: 15px; border-radius: 8px; margin-bottom: 20px;}
        .perfect-score-title { color: #155724; font-weight: bold; font-size: 1.1rem;}
    </style>
</head>
<body>

<div class="quiz-container" id="quizContainer">
    <div class="header" id="quizHeader">
        <span class="progress" id="progressText">1 / 10</span>
        <h2>다음 뜻을 가진 단어는?</h2>
    </div>
    <div id="questionArea">
        <div class="meaning-box" id="meaningText">뜻 불러오는 중...</div>
        <div id="optionsContainer"></div>
        <div id="feedback" class="feedback"></div>
        <button id="nextBtn" class="next-btn" onclick="nextQuestion()">다음 문제</button>
    </div>
</div>

<script>

        { word: "멍덜", meaning: "험한 바위나 돌이 삐죽삐죽 나온 곳" },
        { word: "절용", meaning: "아껴 씀" },
        { word: "논배미", meaning: "논두렁으로 둘러싸인 논의 하나하나의 구역" },
        { word: "타작", meaning: "거둔 곡식을 지주와 소작인이 어떤 비율에 따라 갈라 가지는 제도" },
        { word: "양관", meaning: "서양식으로 지은 집. (=양옥)" },
        { word: "자농", meaning: "자기 땅에 자기가 직접 짓는 농사. 또는 그런 농민이나 농가, 자작농" },
        { word: "천생", meaning: "이미 정하여진 것처럼 어쩔 수 없이" },
        { word: "말년", meaning: "일생의 마지막 무렵" },
        { word: "동구", meaning: "동네 어귀" },

        { word: "염두", meaning: "생각의 시초" },
        { word: "염하다", meaning: "값이 싸다" },

        { word: "변리", 단어: "남에게 돈을 빌려 쓴 대가로 치르는 일정한 비율의 돈" },
        { word: "도시", meaning: "아무리 해도, 도무지" },
        { word: "응과", meaning: "노력에 대한 결실" },
        { word: "소출", meaning: "논밭에서 나는 곡식, 또는 그 곡식의 양" },
        { word: "후레자식", meaning: "배운 데 없이 제물로 막되게 자라 교양이나 버릇이 없는 사람을 낮잡아 이르는 말" },

        { word: "모리지배", meaning: "온갖 수단과 방법으로 자신의 이익만을 꾀하는 사람, 또는 그런 무리" },
        { word: "활인", meaning: "사람의 목숨을 구하여 살림" },
        { word: "전장", meaning: "개인이 소유하는 논밭" },
        { word: "테나다", meaning: "형태를 갖추어 어미의 태로부터 세상에 나오다. (태어나다)" },
        { word: "한목", meaning: "한꺼번에 몰아서 함을 나타내는 말" },
        { word: "야인", meaning: "시골에 사는 사람" },
        { word: "소슬하다", meaning: "으스스하고 쓸쓸하다" },
        { word: "한정", meaning: "수량이나 범위 따위를 제한하여 정함. 또는 그런 한도" },
        { word: "천리", meaning: "천지자연의 이치, 또는 하늘의 바른 도리" },
        { word: "관점", meaning: "사물이나 현상을 관찰할 때 그 사람이 보고 생각하는 태도나 방향" },
        { word: "관철", meaning: "어려움을 뚫고 나아가 목적을 기어이 이룸" },
        { word: "권고", meaning: "어떤 일을 하도록 권하여 말함" },
        { word: "권력", meaning: "남을 복종시키거나 지배할 수 있는 공인된 권리와 힘" },
        { word: "규제", meaning: "규칙이나 규정에 의하여 일정한 한도를 정하거나 그 한도를 넘지 못하게 막음" },
        { word: "공신력", meaning: "공적인 신뢰를 받을 만한 능력" },
        { word: "누적", meaning: "포개어 여러 번 쌓음. 또는 포개져 여러 번 쌓임" },
        { word: "당위", meaning: "마땅히 그렇게 하거나 되어야 하는 것" },
        { word: "대가", meaning: "어떤 노력이나 희생을 치르고 얻는 결과" },
        { word: "대체", meaning: "다른 것으로 바꾸어 놓음" },
        { word: "도모", meaning: "어떤 일을 이루기 위하여 대책과 방법을 세움" },
        { word: "도출", meaning: "판단이나 결론 따위를 이끌어 냄" },
        { word: "도축", meaning: "고기를 얻기 위하여 가축을 잡아 죽임" },
        { word: "만연", meaning: "전염병이나 나쁜 현상 따위가 널리 퍼짐" },
        { word: "맹목적", meaning: "주관이나 이성적인 판단 없이 무조건 덮어놓고 행동하는 것" },
        { word: "맹점", meaning: "미처 생각이 미치지 못한 모순되거나 취약한 점" },
        { word: "명분", meaning: "일을 꾀할 때 내세우는 구실이나 이유 따위" },
        { word: "모순", meaning: "어떤 사실의 앞뒤 또는 두 사실이 이치상 어긋나서 서로 맞지 않음" },
        { word: "미명", meaning: "그럴듯하게 내세운 명목이나 명칭" },
        { word: "미시적", meaning: "사람의 감각으로 직접 식별할 수 없을 만큼 몹시 작은 현상에 관한 것" },
        { word: "발현", meaning: "속에 있거나 숨은 것이 밖으로 나타나거나 그렇게 나타나게 함" },
        { word: "배제", meaning: "물리쳐서 제외함" },
        { word: "보완", meaning: "모자라거나 부족한 것을 보충하여 완전하게 함" },
        { word: "상충", meaning: "맞지 아니하고 서로 어긋남" },
        { word: "수렴", meaning: "의견이나 사상 따위가 여럿으로 나뉘어 있는 것을 하나로 모아 정리함" },
        { word: "시정", meaning: "잘못된 것을 바르게 고침" },
        { word: "시판", meaning: "시중의 시장에서 일반에게 판매함" },
        { word: "실효성", meaning: "실제로 효과를 나타내는 성질" },
        { word: "오만", meaning: "태도나 행동이 건방지거나 거만함" },
        { word: "우후죽순", meaning: "어떤 일이 한때에 많이 생겨남을 비유적으로 이르는 말" },
        { word: "운신", meaning: "몸을 움직임" },
        { word: "왜곡", meaning: "사실과 다르게 해석하거나 그릇되게 함" },
        { word: "은연중", meaning: "남이 모르는 가운데" },
        { word: "의제", meaning: "회의에서 의논할 문제" },
        { word: "일방적", meaning: "어느 한쪽으로 치우친 것" },
        { word: "전기", meaning: "전환점이 되는 기회나 시기" },
        { word: "절충", meaning: "서로 다른 사물이나 의견을 알맞게 조절하여 잘 어울리게 함" },
        { word: "정당화", meaning: "이치에 맞아 올바르거나 또는 올바른 것으로 인정받게 함" },
        { word: "저해", meaning: "막아서 못하도록 방해함" },
        { word: "조작", meaning: "어떤 일을 사실인 듯이 꾸며 만듦" },
        { word: "존엄", meaning: "인물이나 지위 따위가 감히 범할 수 없을 정도로 높고 엄숙함" },
        { word: "좌지우지", meaning: "이리저리 제 마음대로 휘두르거나 다룸" },
        { word: "직결", meaning: "중간에 다른 사물을 거치지 아니하고 직접 연결됨" },
        { word: "직관적", meaning: "판단이나 추리 과정 없이 대상을 직접적으로 파악하는 것" },
        { word: "지평", meaning: "사물의 전망이나 가능성 따위를 비유적으로 이르는 말" },
        { word: "척도", meaning: "평가하거나 측정할 때 의거할 기준" },
        { word: "촉발", meaning: "어떤 일을 당하여 감정이나 충동 따위가 일어남" },
        { word: "침해", meaning: "침범하여 해를 끼침" },
        { word: "타당성", meaning: "사물의 이치에 맞는 올바른 성질" },
        { word: "편향", meaning: "한쪽으로 치우침" },
        { word: "합리화", meaning: "정당하지 못한 일에 표면상 그럴듯한 이유를 붙여 정당화함" },
        { word: "혐오", meaning: "밉고 불쾌하게 여겨 꺼림" }
    ];

    const TOTAL_QUESTIONS = 10; 
    let currentQuizList = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let wrongAnswers = []; // 오답을 저장할 배열 추가

    const progressText = document.getElementById('progressText');
    const meaningText = document.getElementById('meaningText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const quizHeader = document.getElementById('quizHeader');
    const questionArea = document.getElementById('questionArea');

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        let shuffledWords = shuffleArray([...wordBank]);
        currentQuizList = shuffledWords.slice(0, TOTAL_QUESTIONS); 
        currentQuestionIndex = 0;
        score = 0;
        wrongAnswers = []; // 새 퀴즈 시작 시 오답 초기화
        quizHeader.style.display = 'flex';
        loadQuestion();
    }

    function loadQuestion() {
        feedback.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        progressText.innerText = `${currentQuestionIndex + 1} / ${TOTAL_QUESTIONS}`;
        
        const currentWordData = currentQuizList[currentQuestionIndex];
        meaningText.innerHTML = `"${currentWordData.meaning}"`;
        
        let options = [currentWordData.word];
        let remainingWords = wordBank.filter(item => item.word !== currentWordData.word);
        remainingWords = shuffleArray(remainingWords);
        
        for(let i=0; i<3; i++) {
            options.push(remainingWords[i].word);
        }
        options = shuffleArray(options); 

        options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(opt, currentWordData.word, btn, currentWordData.meaning);
            optionsContainer.appendChild(btn);
        });
    }

    // 함수에 meaning 파라미터 추가
    function checkAnswer(selectedWord, correctWord, selectedBtn, currentMeaning) {
        const allOptions = optionsContainer.querySelectorAll('.option');
        allOptions.forEach(btn => btn.disabled = true);

        feedback.style.display = 'block';

        if (selectedWord === correctWord) {
            score++;
            selectedBtn.style.backgroundColor = '#d4edda';
            selectedBtn.style.borderColor = '#c3e6cb';
            feedback.className = 'feedback correct';
            feedback.innerHTML = "<b>⭕ 정답입니다!</b>";
        } else {
            // 틀린 문제 정보를 배열에 저장
            wrongAnswers.push({
                meaning: currentMeaning,
                userChoice: selectedWord,
                correct: correctWord
            });

            selectedBtn.style.backgroundColor = '#f8d7da';
            selectedBtn.style.borderColor = '#f5c6cb';
            
            allOptions.forEach(btn => {
                if(btn.innerHTML === correctWord) {
                    btn.style.backgroundColor = '#d4edda';
                }
            });

            feedback.className = 'feedback incorrect';
            feedback.innerHTML = `<b>❌ 오답입니다.</b><br>정답은 <b>'${correctWord}'</b> 입니다.`;
        }

        nextBtn.style.display = 'block';
        if (currentQuestionIndex === TOTAL_QUESTIONS - 1) {
            nextBtn.innerText = '결과 보기';
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < TOTAL_QUESTIONS) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        quizHeader.style.display = 'none';
        
        // 1. 기본 점수 화면
